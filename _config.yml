# ==========================================================================
#   网站基础信息
# ==========================================================================

title: "Yuer Gao's homepage"
description: "Yuer Gao | Ph.D. Student at HKUST(GZ) | Embodied Underwater Intelligence, Marine Robotics, Active Perception, 3D Reconstruction"

# GitHub 仓库（仓库名要严格等于 username.github.io）
repository: "Insomnia813/Insomnia813.github.io"

url: "https://insomnia813.github.io"
baseurl: ""

masthead_title: " "

# ==========================================================================
#   Google Scholar 自动抓取（强烈推荐开启）
# ==========================================================================
# 你的 Scholar ID 已经填好。剩下两步：
# 1) 仓库 Settings → Secrets and variables → Actions → New secret
#    Name = GOOGLE_SCHOLAR_ID, Value = PwHsHYgAAAAJ
# 2) 仓库 Actions 选项卡 → 启用 workflow（首次需要手动 run）
scholar_userid: "PwHsHYgAAAAJ"

# ==========================================================================
#   Google Analytics（可选）
# ==========================================================================
analytics:
  provider: false
  google:
    tracking_id: "G-XXXXXXXXXX"

# ==========================================================================
#   SEO 验证（可选，没有也无所谓）
# ==========================================================================
google_site_verification: ""
bing_site_verification: ""
baidu_site_verification: ""

# ==========================================================================
#   作者信息（左侧名片栏）
# ==========================================================================
author:
  name: "Yuer Gao"
  # 头像：放一张 300x300 的 PNG/JPG 到 images/ 目录下，文件名建议 profile.png
  avatar: "profile.png"
  # 这一句是名片"标签"，研究身份导向（非简历导向）
  bio: "Embodied Underwater Intelligence · Marine Robotics · Active Perception · 3D Reconstruction"
  employer: "HKUST(Guangzhou)"
  location: "Guangzhou, China"

  # 联系方式 / 社交链接
  email: "YOUR_EMAIL@hkust-gz.edu.cn"   # ← 填你的邮箱
  googlescholar: "https://scholar.google.com/citations?user=PwHsHYgAAAAJ"
  github: "Insomnia813"
  twitter: ""        # 如果有 X/Twitter 填用户名（不带 @）
  linkedin: ""       # linkedin.com/in/ 后面那段
  orcid: ""          # 没注册的话可以去 orcid.org 免费注册一个
  researchgate: ""

  # 这些一般留空
  pubmed: ""
  wechat: ""
  zhihu: ""
  weibo: ""
  bilibili: ""
  youtube: ""

# ==========================================================================
#   全站默认配置（不用改）
# ==========================================================================
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
locale: "en-US"
breadcrumbs: true
words_per_minute: 160
enable_copy_code_button: true
search: true

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false
      show_date: false
      classes: wide
