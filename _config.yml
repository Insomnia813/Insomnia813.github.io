  avatar: "images/profile.jpg"
 #  bio: "Embodied Underwater Intelligence · Marine Robotics · Active Perception · 3D Reconstruction"
  employer: "HKUST(Guangzhou)"
  location: "Guangzhou, China"

  # 联系方式 / 社交链接（没有的留空即可）
  email: "ygao438@connect.hkust-gz.edu.cn"   # ← 填你的邮箱
  googlescholar: "https://scholar.google.com/citations?user=PwHsHYgAAAAJ"
  github: "Insomnia813"
  linkedin: ""
  orcid: "https://orcid.org/0000-0001-8004-123X"
  researchgate: "https://www.researchgate.net/profile/Yuer-Gao?ev=hdr_xprf"
  pubmed:
  uri:
  bitbucket:
  codepen:
  dribbble:
  flickr:
  facebook:
  foursquare:
  google_plus:
  keybase:
  instagram:
  impactstory:
  lastfm:
  dblp:
  pinterest:
  soundcloud:
  stackoverflow:
  steam:
  tumblr:
  vine:
  weibo:
  xing:
  youtube:
